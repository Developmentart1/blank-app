services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TZ: ${TZ}
      ALERT_AMBER: ${ALERT_AMBER}
      ALERT_ORANGE: ${ALERT_ORANGE}
      ALERT_RED: ${ALERT_RED}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT}/api
      TZ: ${TZ}
    command: sh -c "npm install --loglevel=error && npm run dev -- --host 0.0.0.0 | cat"
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app

volumes:
  db_data:
